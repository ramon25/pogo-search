<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Generiert Pokémon-GO-Suchstrings zum sicheren Aufräumen der Pokémon-Box."
    />
    <title>PoGO Box-Cleanup – Suchstring-Generator</title>
    <script>
      // Dark Mode so früh wie möglich setzen, um Flackern zu vermeiden.
      (function () {
        try {
          var theme = JSON.parse(localStorage.getItem('pogo-search:theme') || '"system"')
          var dark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
